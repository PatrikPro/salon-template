<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#F5EDE2"/>
  <!-- Interior scene: window + table + chair -->
  <rect x="50" y="50" width="200" height="250" rx="8" fill="#FFFFFF" stroke="#D4C0A8" stroke-width="2"/>
  <line x1="150" y1="50" x2="150" y2="300" stroke="#D4C0A8" stroke-width="1"/>
  <line x1="50" y1="175" x2="250" y2="175" stroke="#D4C0A8" stroke-width="1"/>
  <!-- Table -->
  <rect x="300" y="220" width="200" height="10" rx="5" fill="#BB9F80"/>
  <rect x="340" y="230" width="6" height="80" fill="#A27F58"/>
  <rect x="454" y="230" width="6" height="80" fill="#A27F58"/>
  <!-- Book on table -->
  <rect x="350" y="200" width="60" height="20" rx="2" fill="#7FB77E" opacity="0.6"/>
  <!-- Cup on table -->
  <circle cx="450" cy="210" r="15" fill="#FFFFFF" stroke="#6B4F3A" stroke-width="2"/>
  <!-- Sunlight rays -->
  <rect x="80" y="80" width="140" height="80" fill="#FFF9E6" opacity="0.3" rx="4"/>
  <text x="300" y="370" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#BB9F80">placeholder – interiér kavárny</text>
</svg>
