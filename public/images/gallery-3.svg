<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#F5EDE2"/>
  <!-- Pastry display -->
  <rect x="100" y="180" width="400" height="15" rx="4" fill="#D4C0A8"/>
  <!-- Glass dome -->
  <path d="M200 180 C200 100 400 100 400 180" stroke="#BB9F80" stroke-width="2" fill="none"/>
  <!-- Croissants -->
  <ellipse cx="250" cy="165" rx="30" ry="15" fill="#D4C0A8"/>
  <ellipse cx="320" cy="160" rx="25" ry="12" fill="#DBC5AE"/>
  <ellipse cx="370" cy="165" rx="28" ry="14" fill="#D4C0A8"/>
  <!-- Cake -->
  <rect x="140" y="140" width="40" height="40" rx="4" fill="#E8D9C8"/>
  <rect x="140" y="140" width="40" height="8" rx="2" fill="#7FB77E" opacity="0.4"/>
  <!-- Labels -->
  <rect x="130" y="200" width="60" height="15" rx="2" fill="#FFFFFF"/>
  <rect x="240" y="200" width="60" height="15" rx="2" fill="#FFFFFF"/>
  <rect x="360" y="200" width="60" height="15" rx="2" fill="#FFFFFF"/>
  <text x="300" y="370" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#BB9F80">placeholder – pečivo a sladké</text>
</svg>
